name: Daily Consultations Digest

on:
  schedule:
    # 10:00 UTC = 5:00 AM Eastern Standard Time (6:00 AM EDT in summer)
    - cron: '0 10 * * *'
  workflow_dispatch:   # lets you trigger a run manually from the GitHub website
  push:
    branches: [main]   # also runs whenever code is pushed

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: read    # read the repo
      pages: write      # deploy to GitHub Pages
      id-token: write   # needed for Pages auth

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate digest
        run: python generate_digest.py

      - name: Copy digest to docs/index.html
        run: |
          mkdir -p docs
          cp digest_$(date +%Y-%m-%d).html docs/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
