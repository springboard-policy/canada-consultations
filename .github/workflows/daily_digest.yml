name: Daily Consultations Digest

on:
  schedule:
    # 10:00 UTC = 5:00 AM Eastern Standard Time (6:00 AM EDT in summer)
    - cron: '0 10 * * *'
  workflow_dispatch:   # lets you trigger a run manually from the GitHub website
  push:
    branches: [main]   # also runs whenever code is pushed

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit docs/index.html back to the repo

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate digest
        run: python generate_digest.py

      - name: Copy digest to docs/index.html
        run: |
          mkdir -p docs
          cp digest_$(date +%Y-%m-%d).html docs/index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git commit -m "Digest: $(date +%Y-%m-%d)" || echo "No changes to commit"
          git push
